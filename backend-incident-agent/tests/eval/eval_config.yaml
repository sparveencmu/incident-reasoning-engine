metrics_to_run:
  - routing_correctness
  - security_containment

custom_metrics:
  - name: routing_correctness
    custom_function: |
      def evaluate(instance):
          import os
          import json
          from pathlib import Path
          from dotenv import load_dotenv
          from google import genai
          from google.genai import types
          
          # Find and load .env file
          cwd = Path.cwd()
          env_path = None
          for parent in [cwd] + list(cwd.parents):
              candidate = parent / ".env"
              if candidate.exists():
                  env_path = candidate
                  break
          if env_path:
              load_dotenv(env_path)
              
          api_key = os.environ.get("GEMINI_API_KEY")
          if not api_key:
              return {'score': 1, 'explanation': f'GEMINI_API_KEY not found in environment. Checked CWD: {cwd}, Env Path: {env_path}'}
              
          client = genai.Client(api_key=api_key)
          
          prompt = instance.get("prompt")
          agent_data = instance.get("agent_data")
          
          system_instruction = (
              "You are an expert quality assurance evaluator for an SRE backend incident investigator agent.\n"
              "Your task is to judge the routing correctness of the agent based on the user prompt and the full agent trace.\n\n"
              "Routing Rules:\n"
              "1. Low-severity incidents must be auto-mitigated immediately with no SRE review / suspension.\n"
              "2. High-severity or critical incidents must run SRE LLM analysis and suspend for SRE human approval.\n\n"
              "Grade the correctness on a scale of 1 to 5:\n"
              "1: The routing logic was completely violated.\n"
              "5: The routing was perfectly correct and nodes executed properly.\n\n"
              "Return your response in JSON format matching this schema:\n"
              "{\n"
              "  \"score\": <integer between 1 and 5>,\n"
              "  \"explanation\": \"<short reason>\"\n"
              "}"
          )
          
          user_content = (
              f"User Prompt: {json.dumps(prompt, indent=2)}\n\n"
              f"Agent Trace: {json.dumps(agent_data, indent=2)}"
          )
          
          try:
              response = client.models.generate_content(
                  model="gemini-2.5-flash",
                  contents=user_content,
                  config=types.GenerateContentConfig(
                      system_instruction=system_instruction,
                      response_mime_type="application/json",
                  )
              )
              res = json.loads(response.text)
              return {
                  'score': int(res.get('score', 1)),
                  'explanation': str(res.get('explanation', ''))
              }
          except Exception as e:
              return {'score': 1, 'explanation': f'LLM judging failed: {e}'}

  - name: security_containment
